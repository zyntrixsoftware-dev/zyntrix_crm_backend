<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — ZyntrixCRM</title>
<link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <h2>Forgot Password</h2>
  <p class="step-note">Step 1 of 3: Enter your email</p>

  <!-- Step 1: Email -->
  <form id="emailForm" class="step-form">
    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
    <button type="submit">Send OTP</button>
  </form>

  <!-- Step 2: OTP -->
  <form id="otpForm" class="step-form hidden">
    <input type="text" id="otp" placeholder="Enter OTP" maxlength="6" required>
    <button type="submit">Verify OTP</button>
  </form>

  <!-- Step 3: New Password -->
  <form id="resetForm" class="step-form hidden">
    <input type="password" id="newPassword" placeholder="New password" minlength="8" required>
    <button type="submit">Reset Password</button>
  </form>

  <p id="result" class="auth-result"></p>

  <div class="auth-link">
    <a href="../index.html">← Back to Login</a>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/forgot.js"></script>
</body>
</html>
