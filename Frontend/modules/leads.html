<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads - Zyntrix CRM</title>
<link rel="stylesheet" href="../assets/css/attendance.css">
<link rel="stylesheet" href="../assets/css/module-pages.css">
</head>
<body>
<div class="app">
	<aside class="sidebar">
		<div>
			<div class="brand">
				<div class="brand-mark">Z</div>
				<div>
					<strong>Zyntrix</strong>
					<span>EdTech CRM</span>
				</div>
			</div>
			<nav class="side-nav" aria-label="Primary">
				<a href="sales.html"><span class="nav-icon">▣</span>Sales</a>
				<a class="active" href="leads.html"><span class="nav-icon">⌕</span>Leads</a>
			</nav>
		</div>

		<div class="sidebar-user">
			<img src="https://i.pravatar.cc/80?img=18" alt="">
			<div>
				<strong id="sideUserName">Zyntrix Sales</strong>
				<span id="sideUserEmail">sales@zyntrix.com</span>
			</div>
			<button class="icon-button small" type="button" aria-label="Open profile menu">⌄</button>
		</div>
	</aside>

	<main class="main">
		<header class="topbar">
			<h1>Leads Management</h1>
			<div class="topbar-actions">
				<div class="top-profile">
					<img src="https://i.pravatar.cc/80?img=18" alt="">
					<div>
						<strong id="userName">Zyntrix Sales</strong>
						<span id="userRole">Sales</span>
					</div>
					<button onclick="logout()" type="button" aria-label="Logout" style="background:rgba(244,63,94,0.12);border:1px solid rgba(244,63,94,0.25);cursor:pointer;color:#f43f5e;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;letter-spacing:0.3px;transition:all 0.15s;white-space:nowrap;font-family:inherit;" onmouseover="this.style.background='rgba(244,63,94,0.22)'" onmouseout="this.style.background='rgba(244,63,94,0.12)'">⏻ Logout</button>
				</div>
			</div>
		</header>

		<section class="module-content">
			<section class="section-panel">
				<h2>Add New Lead</h2>
				<div class="form-grid">
					<input id="leadName" placeholder="Full Name">
					<input id="leadPhone" placeholder="Phone">
					<input id="leadSource" placeholder="Source (Facebook, Website)">
				</div>
				<div style="margin-top: 12px;">
					<button onclick="addLead()" type="button">Add Lead</button>
				</div>
			</section>

			<section class="section-panel">
				<h2>Pipeline</h2>
				<div style="display: flex; gap: 10px; flex-wrap: wrap;">
					<button class="secondary" onclick="filterLeads('all')" type="button">All</button>
					<button class="secondary" onclick="filterLeads('new')" type="button">New</button>
					<button class="secondary" onclick="filterLeads('contacted')" type="button">Contacted</button>
					<button class="secondary" onclick="filterLeads('interested')" type="button">Interested</button>
					<button class="secondary" onclick="filterLeads('converted')" type="button">Converted</button>
				</div>
			</section>

			<section class="section-panel">
				<h2>Leads Table</h2>
				<div class="table-wrap">
					<table>
						<thead>
							<tr>
								<th>Name</th>
								<th>Phone</th>
								<th>Source</th>
								<th>Status</th>
								<th>Action</th>
							</tr>
						</thead>
						<tbody id="leadsTable"></tbody>
					</table>
				</div>
			</section>
		</section>
	</main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
requireAuth();
requireModuleAccess("sales");

const user = JSON.parse(localStorage.getItem("user"));
if (user) {
	document.getElementById("userName").innerText = user.name || "Zyntrix Sales";
	document.getElementById("sideUserName").innerText = user.name || "Zyntrix Sales";
	document.getElementById("sideUserEmail").innerText = user.email || "sales@zyntrix.com";
	document.getElementById("userRole").innerText = user.role ? user.role.replace("_", " ") : "Sales";
}
</script>

<script>

// ==========================
// STORAGE
// ==========================

function getLeads(){
return JSON.parse(localStorage.getItem("zyntrix_leads")) || [];
}

function saveLeads(leads){
localStorage.setItem("zyntrix_leads", JSON.stringify(leads));
}

// ==========================
// ADD LEAD
// ==========================

function addLead(){

const name = document.getElementById("leadName").value;
const phone = document.getElementById("leadPhone").value;
const source = document.getElementById("leadSource").value;

if(!name || !phone){
alert("Fill required fields");
return;
}

const leads = getLeads();

leads.push({
id: Date.now(),
name,
phone,
source,
status:"new"
});

saveLeads(leads);

loadLeads();

document.getElementById("leadName").value="";
document.getElementById("leadPhone").value="";
document.getElementById("leadSource").value="";
}

// ==========================
// LOAD LEADS
// ==========================

let currentFilter = "all";

function loadLeads(){

const table = document.getElementById("leadsTable");
table.innerHTML = "";

let leads = getLeads();

if(currentFilter !== "all"){
leads = leads.filter(l => l.status === currentFilter);
}

leads.forEach(lead => {

table.innerHTML += `
<tr>
<td>${lead.name}</td>
<td>${lead.phone}</td>
<td>${lead.source || "-"}</td>

<td>
<select onchange="changeStatus(${lead.id}, this.value)">
<option ${lead.status==="new"?"selected":""}>new</option>
<option ${lead.status==="contacted"?"selected":""}>contacted</option>
<option ${lead.status==="interested"?"selected":""}>interested</option>
<option ${lead.status==="converted"?"selected":""}>converted</option>
</select>
</td>

<td>
<button onclick="deleteLead(${lead.id})">Delete</button>
</td>

</tr>
`;

});

}

// ==========================
// STATUS CHANGE
// ==========================

function changeStatus(id, status){

const leads = getLeads();

const lead = leads.find(l => l.id === id);

lead.status = status;

saveLeads(leads);

loadLeads();
}

// ==========================
// DELETE
// ==========================

function deleteLead(id){

let leads = getLeads();

leads = leads.filter(l => l.id !== id);

saveLeads(leads);

loadLeads();
}

// ==========================
// FILTER
// ==========================

function filterLeads(status){
currentFilter = status;
loadLeads();
}

// INIT
loadLeads();

</script>

</body>
</html>
