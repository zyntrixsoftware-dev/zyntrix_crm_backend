<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quizzes — Zyntrix LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080e18;--bg2:#0d1624;--bg3:#111e30;--bg4:#162436;--accent:#00e5b0;--blue:#3d8ef0;--amber:#f5a623;--rose:#ff4d6d;--green:#22c55e;--purple:#b57bee;--text:#e8f0fe;--text2:#8ba3bf;--text3:#4e6680;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--accent-dim:rgba(0,229,176,.10);--font:'Instrument Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;--sidebar:230px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
.shell{display:flex;height:100vh}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.brand-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--blue));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;color:var(--bg)}
.nav-grp{padding:12px 8px 4px}.nav-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:0 8px 6px}
.nav-a{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;color:var(--text2);font-size:12.5px;text-decoration:none;margin-bottom:1px}
.nav-a:hover{background:rgba(255,255,255,.04);color:var(--text)}.nav-a.on{background:var(--accent-dim);color:var(--accent)}
.nav-ico{width:16px;text-align:center}.sb-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px}
.pg-title{font-family:var(--display);font-size:15px;font-weight:700;flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;text-decoration:none}
.btn-prim{background:var(--accent);color:var(--bg)}.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-rose{background:rgba(255,77,109,.12);color:var(--rose);border:1px solid rgba(255,77,109,.2)}.btn-sm{padding:5px 11px;font-size:11.5px}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.sel,.input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;padding:8px 12px;outline:none;width:100%}
.sel:focus,.input:focus{border-color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:6px}
.muted{color:var(--text3);font-size:11px}.empty{text-align:center;color:var(--text3);padding:40px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.modal.on{display:flex}
.modal-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:min(640px,100%);max-height:90vh;overflow-y:auto}
.fl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin:10px 0 5px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;display:none;z-index:60}.toast.on{display:block}
.chip{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--bg3);color:var(--text2)}
.row2{display:flex;gap:12px}.row2>div{flex:1}
.item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}.item:last-child{border-bottom:none}
.qblock{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}</style></head><body><div class="shell">
<aside class="sidebar"><div class="brand"><div class="brand-mark">Z</div><div><div style="font-family:var(--display);font-size:13px;font-weight:800">Zyntrix LMS</div><div style="font-size:9px;color:var(--text3);font-family:var(--mono)">Admin</div></div></div>
  <div class="nav-grp"><div class="nav-lbl">Manage</div>
    <a class="nav-a" href="dashboard.html"><span class="nav-ico">▦</span> Dashboard</a>
    <a class="nav-a" href="content-builder.html"><span class="nav-ico">✎</span> Content Builder</a>
    <a class="nav-a " href="assignments.html"><span class="nav-ico">▤</span> Assignments</a>
    <a class="nav-a on" href="quizzes.html"><span class="nav-ico">?</span> Quizzes</a>
    <a class="nav-a " href="announcements.html"><span class="nav-ico">◔</span> Announcements</a>
    <a class="nav-a" href="live-classes.html"><span class="nav-ico">⏵</span> Live Classes</a>
    <a class="nav-a" href="gradebook.html"><span class="nav-ico">▥</span> Gradebook</a>
    <a class="nav-a" href="reports.html"><span class="nav-ico">▣</span> Reports</a>
    <a class="nav-a" href="operations.html"><span class="nav-ico">⚙</span> Operations</a>
    <a class="nav-a " href="students.html"><span class="nav-ico">☰</span> Students</a>
  </div>
  <div class="nav-grp"><div class="nav-lbl">Learner</div>
    <a class="nav-a" href="student-dashboard.html"><span class="nav-ico">◉</span> My Learning</a>
  </div>
<div class="sb-foot"><button class="btn btn-rose btn-sm" style="width:100%;justify-content:center" onclick="lmsLogout()">⏻ Logout</button></div></aside>
<div class="main"><div class="topbar"><div class="pg-title">Quizzes</div>
<select class="sel" id="courseSel" style="width:auto" onchange="load()"></select>
<button class="btn btn-prim btn-sm" onclick="openNew()">＋ New Quiz</button></div>
<div class="content" id="list"><div class="empty">Select a course.</div></div></div></div>

<div class="modal" id="m-new"><div class="modal-card"><h3>New Quiz</h3>
<label class="fl">Title</label><input class="input" id="q-title">
<div class="row2"><div><label class="fl">Pass mark (%)</label><input class="input" id="q-pass" type="number" value="50"></div><div><label class="fl">Time limit (min, 0=none)</label><input class="input" id="q-time" type="number" value="0"></div></div>
<div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px"><strong style="font-size:13px">Questions</strong><button class="btn btn-ghost btn-sm" onclick="addQ()">＋ Question</button></div>
<div id="qs"></div>
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-ghost btn-sm" onclick="closeM('m-new')">Cancel</button><button class="btn btn-prim btn-sm" onclick="save()">Save Quiz</button></div></div></div>

<div class="modal" id="m-att"><div class="modal-card"><h3>Attempts</h3><div id="att-body"></div><div style="text-align:right;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="closeM('m-att')">Close</button></div></div></div>
<div class="toast" id="toast"></div>
<script src="../../assets/js/api.js"></script>
<script>
if(!localStorage.getItem("token")){location.href=location.origin+"/crm/index.html";}
var COURSES=[],CUR="",QZ=[];
var $=function(i){return document.getElementById(i);};
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function toast(t){var e=$("toast");e.textContent=t;e.classList.add("on");setTimeout(function(){e.classList.remove("on");},2200);}
function closeM(i){$(i).classList.remove("on");}
async function init(){var d=await apiRequest("/lms/courses");COURSES=(d&&d.courses)||[];$("courseSel").innerHTML='<option value="">— Course —</option>'+COURSES.map(function(c){return '<option value="'+c._id+'">'+esc(c.title)+'</option>';}).join("");}
async function load(){CUR=$("courseSel").value;if(!CUR){$("list").innerHTML='<div class="empty">Select a course.</div>';return;}
var d=await apiRequest("/lms/quizzes?course="+CUR);var items=(d&&d.quizzes)||[];
$("list").innerHTML=items.length?items.map(function(z){var n=(z.questions||[]).length;
return '<div class="card"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><h3>'+esc(z.title)+'</h3><div class="muted">'+n+' questions · pass '+(z.passMark||0)+'%'+(z.timeLimitMin?(' · '+z.timeLimitMin+' min'):'')+'</div></div>'+
'<button class="btn btn-ghost btn-sm" onclick="viewAtt(\''+z._id+'\')">Attempts</button>'+
'<button class="btn btn-rose btn-sm" onclick="del(\''+z._id+'\')">✕</button></div></div>';
}).join(""):'<div class="empty">No quizzes yet.</div>';}
function openNew(){QZ=[];$("q-title").value="";$("q-pass").value=50;$("q-time").value=0;addQ();$("m-new").classList.add("on");}
function addQ(){QZ.push({q:"",options:["","","",""],correctIndex:0,marks:1});renderQ();}
function renderQ(){$("qs").innerHTML=QZ.map(function(q,i){
return '<div class="qblock"><div style="display:flex;gap:8px"><input class="input" placeholder="Question '+(i+1)+'" value="'+esc(q.q)+'" oninput="QZ['+i+'].q=this.value"><button class="btn btn-rose btn-sm" onclick="QZ.splice('+i+',1);renderQ()">✕</button></div>'+
[0,1,2,3].map(function(o){return '<div style="display:flex;align-items:center;gap:8px;margin-top:6px"><input type="radio" name="c'+i+'" '+(q.correctIndex===o?'checked':'')+' onchange="QZ['+i+'].correctIndex='+o+'"><input class="input" placeholder="Option '+(o+1)+'" value="'+esc(q.options[o]||"")+'" oninput="QZ['+i+'].options['+o+']=this.value"></div>';}).join("")+
'<div class="muted" style="margin-top:6px">Select the radio for the correct answer.</div></div>';
}).join("");}
async function save(){var title=$("q-title").value.trim();if(!title){toast("Title required");return;}
var qs=QZ.filter(function(q){return q.q.trim();});if(!qs.length){toast("Add at least one question");return;}
var body={course:CUR,title:title,passMark:Number($("q-pass").value)||0,timeLimitMin:Number($("q-time").value)||0,questions:qs};
var r=await apiRequest("/lms/quizzes","POST",body);if(r&&!r.error){closeM('m-new');load();toast("Quiz created");}else toast((r&&r.msg)||"Error");}
async function del(id){if(!confirm("Delete quiz and attempts?"))return;var r=await apiRequest("/lms/quizzes/"+id,"DELETE");if(r&&!r.error){load();toast("Deleted");}}
async function viewAtt(id){var d=await apiRequest("/lms/quizzes/"+id+"/attempts");var a=(d&&d.attempts)||[];
$("att-body").innerHTML=a.length?a.map(function(x){var nm=x.student&&x.student.name?x.student.name:"Student";return '<div class="item"><div class="it-t"><div class="nm">'+esc(nm)+'</div><div class="sb">'+new Date(x.submittedAt).toLocaleString("en-IN")+'</div></div><span class="chip" style="color:'+(x.passed?'var(--green)':'var(--rose)')+'">'+x.percent+'% '+(x.passed?'PASS':'FAIL')+'</span></div>';}).join(""):'<div class="empty">No attempts yet.</div>';$("m-att").classList.add("on");}
function lmsLogout(){localStorage.removeItem("token");localStorage.removeItem("user");location.href=location.origin+"/crm/index.html";}
init();
</script></body></html>
