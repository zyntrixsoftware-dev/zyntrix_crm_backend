<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Quizzes — Zyntrix LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080e18;--bg2:#0d1624;--bg3:#111e30;--bg4:#162436;--accent:#00e5b0;--blue:#3d8ef0;--amber:#f5a623;--rose:#ff4d6d;--green:#22c55e;--purple:#b57bee;--text:#e8f0fe;--text2:#8ba3bf;--text3:#4e6680;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--accent-dim:rgba(0,229,176,.10);--font:'Instrument Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;--sidebar:230px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
.shell{display:flex;height:100vh}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.brand-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--blue));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;color:var(--bg)}
.nav-grp{padding:12px 8px 4px}.nav-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:0 8px 6px}
.nav-a{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;color:var(--text2);font-size:12.5px;text-decoration:none;margin-bottom:1px}
.nav-a:hover{background:rgba(255,255,255,.04);color:var(--text)}.nav-a.on{background:var(--accent-dim);color:var(--accent)}
.nav-ico{width:16px;text-align:center}.sb-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px}
.pg-title{font-family:var(--display);font-size:15px;font-weight:700;flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;text-decoration:none}
.btn-prim{background:var(--accent);color:var(--bg)}.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-rose{background:rgba(255,77,109,.12);color:var(--rose);border:1px solid rgba(255,77,109,.2)}.btn-sm{padding:5px 11px;font-size:11.5px}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.sel,.input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;padding:8px 12px;outline:none;width:100%}
.sel:focus,.input:focus{border-color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:6px}
.muted{color:var(--text3);font-size:11px}.empty{text-align:center;color:var(--text3);padding:40px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.modal.on{display:flex}
.modal-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:min(640px,100%);max-height:90vh;overflow-y:auto}
.fl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin:10px 0 5px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;display:none;z-index:60}.toast.on{display:block}
.chip{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--bg3);color:var(--text2)}
.qopt{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-top:6px;cursor:pointer}
.reply{background:var(--bg3);border-radius:8px;padding:8px 12px;margin-top:6px;font-size:12.5px}</style></head><body><div class="shell">
<aside class="sidebar"><div class="brand"><div class="brand-mark">Z</div><div><div style="font-family:var(--display);font-size:13px;font-weight:800">Zyntrix LMS</div><div style="font-size:9px;color:var(--text3);font-family:var(--mono)">Learner</div></div></div>
  <div class="nav-grp"><div class="nav-lbl">Learn</div>
    <a class="nav-a " href="student-dashboard.html"><span class="nav-ico">◉</span> My Courses</a>
    <a class="nav-a " href="my-assignments.html"><span class="nav-ico">▤</span> Assignments</a>
    <a class="nav-a on" href="my-quizzes.html"><span class="nav-ico">?</span> Quizzes</a>
    <a class="nav-a " href="doubts.html"><span class="nav-ico">✎</span> Doubts</a>
  </div>
<div class="sb-foot"><button class="btn btn-rose btn-sm" style="width:100%;justify-content:center" onclick="lmsLogout()">⏻ Logout</button></div></aside>
<div class="main"><div class="topbar"><div class="pg-title">My Quizzes</div></div>
<div class="content" id="list"><div class="empty">Loading…</div></div></div></div>
<div class="modal" id="m-take"><div class="modal-card"><h3 id="qz-title">Quiz</h3><div id="qz-body"></div>
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="closeM('m-take')">Cancel</button><button class="btn btn-prim btn-sm" id="qz-submit" onclick="submitQ()">Submit</button></div>
<div id="qz-result"></div></div></div>
<div class="toast" id="toast"></div>
<script src="../../assets/js/api.js"></script>
<script>
if(!localStorage.getItem("token")){location.href=location.origin+"/crm/index.html";}
var $=function(i){return document.getElementById(i);};var TAKE=null,ANS=[];
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function toast(t){var e=$("toast");e.textContent=t;e.classList.add("on");setTimeout(function(){e.classList.remove("on");},2500);}
function closeM(i){$(i).classList.remove("on");}
async function load(){
  var mc=await apiRequest("/lms/my/courses");var courses=(mc&&mc.courses)||[];
  if(!courses.length){$("list").innerHTML='<div class="empty">No enrolled courses found for your account.</div>';return;}
  var all=[];
  for(var i=0;i<courses.length;i++){var d=await apiRequest("/lms/quizzes?course="+courses[i].course._id);(d&&d.quizzes||[]).forEach(function(q){q._ct=courses[i].course.title;all.push(q);});}
  if(!all.length){$("list").innerHTML='<div class="empty">No quizzes yet.</div>';return;}
  $("list").innerHTML=all.map(function(q){var best=(q.myAttempts||[]).reduce(function(m,a){return Math.max(m,a.percent);},-1);
    return '<div class="card"><div style="display:flex;gap:10px;align-items:center"><div style="flex:1"><h3>'+esc(q.title)+'</h3><div class="muted">'+esc(q._ct)+' · '+(q.questionCount||0)+' questions · pass '+(q.passMark||0)+'%'+(best>=0?(' · best '+best+'%'):'')+'</div></div>'+
      '<button class="btn btn-prim btn-sm" onclick="take(\''+q._id+'\')">'+(best>=0?'Retake':'Start')+'</button></div></div>';
  }).join("");
}
async function take(id){var d=await apiRequest("/lms/quizzes/"+id+"/take");if(!d||d.error){toast((d&&d.msg)||"Cannot start");return;}
  TAKE=d.quiz;ANS=new Array(TAKE.questions.length);$("qz-result").innerHTML="";$("qz-submit").style.display="inline-flex";$("qz-title").textContent=TAKE.title;
  $("qz-body").innerHTML=TAKE.questions.map(function(q,i){return '<div class="card"><div style="font-weight:600;font-size:13px">'+(i+1)+'. '+esc(q.q)+'</div>'+
    q.options.map(function(o,oi){return '<label class="qopt"><input type="radio" name="q'+i+'" onchange="ANS['+i+']='+oi+'"> '+esc(o)+'</label>';}).join("")+'</div>';}).join("");
  $("m-take").classList.add("on");
}
async function submitQ(){var r=await apiRequest("/lms/quizzes/"+TAKE._id+"/attempt","POST",{answers:ANS});
  if(r&&!r.error){var a=r.attempt;$("qz-body").innerHTML="";$("qz-submit").style.display="none";
    $("qz-result").innerHTML='<div class="card" style="text-align:center"><div style="font-size:30px;font-weight:800;font-family:var(--display);color:'+(a.passed?'var(--green)':'var(--rose)')+'">'+a.percent+'%</div><div class="muted">'+a.score+' / '+a.total+' marks · '+(a.passed?'PASSED ✓':'Not passed')+'</div></div>';load();}
  else toast((r&&r.msg)||"Error");
}
function lmsLogout(){localStorage.removeItem("token");localStorage.removeItem("user");location.href=location.origin+"/crm/index.html";}
load();
</script></body></html>
