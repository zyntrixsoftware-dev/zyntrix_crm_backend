<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Course Player — Zyntrix LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080e18;--bg2:#0d1624;--bg3:#111e30;--accent:#00e5b0;--blue:#3d8ef0;--green:#22c55e;--amber:#f5a623;--text:#e8f0fe;--text2:#8ba3bf;--text3:#4e6680;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--accent-dim:rgba(0,229,176,.10);--rose:#ff4d6d;--font:'Instrument Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
.shell{display:flex;height:100vh}
.lessons{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lh{padding:16px;border-bottom:1px solid var(--border)}
.lh a{font-size:11px;color:var(--text3);text-decoration:none}
.lh .ct{font-family:var(--display);font-weight:800;font-size:15px;margin:8px 0 10px}
.bar{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}.bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s}
.pct{font-size:11px;color:var(--text2);margin-top:5px}
.llist{flex:1;overflow-y:auto;padding:8px}
.mod-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:12px 10px 6px}
.les{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--text2)}
.les:hover{background:rgba(255,255,255,.04);color:var(--text)}.les.on{background:var(--accent-dim);color:var(--accent)}
.tick{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.tick.done{background:var(--green);border-color:var(--green);color:var(--bg)}
.les .ico{width:14px;text-align:center;flex-shrink:0;color:var(--text3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:10px}
.lt{font-weight:700;flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600;text-decoration:none}
.btn-prim{background:var(--accent);color:var(--bg)}.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-done{background:var(--green);color:var(--bg)}
.stage{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;align-items:center}
.vwrap{width:100%;max-width:900px;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;margin-bottom:18px}
.vwrap video,.vwrap iframe{width:100%;height:100%;border:0;display:block}
.body{width:100%;max-width:900px}
.txt{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;white-space:pre-wrap;line-height:1.7;color:var(--text2)}
.res{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-top:8px;text-decoration:none;color:var(--text)}
.empty{color:var(--text3);text-align:center;padding:60px}
.ph{background:var(--bg2);border:1px dashed var(--border2);border-radius:12px;padding:40px;text-align:center;color:var(--text3);width:100%;max-width:900px}
</style>
</head>
<body>
<div class="shell">
<aside class="lessons">
  <div class="lh"><a href="student-dashboard.html">← My Courses</a><div class="ct" id="ct">Loading…</div>
    <div class="bar"><div class="bar-fill" id="bar" style="width:0"></div></div><div class="pct" id="pct">0% complete</div>
  </div>
  <div class="llist" id="llist"></div>
</aside>
<div class="main">
  <div class="topbar"><div class="lt" id="lessonTitle">—</div><button class="btn btn-done" id="completeBtn" onclick="markComplete()" style="display:none">✓ Mark complete</button></div>
  <div class="stage" id="stage"><div class="empty">Select a lesson to begin.</div></div>
</div>
</div>
<script src="../../assets/js/api.js"></script>
<script>
if(!localStorage.getItem("token")){ location.href=location.origin+"/crm/index.html"; }
var TOKEN=localStorage.getItem("token");
var HOST=API_BASE.replace(/\/api$/,"");
var COURSE_ID=new URLSearchParams(location.search).get("course");
var DATA=null, CUR=null, saveTimer=0;
var $=function(id){return document.getElementById(id);};
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
var ICON={video:"▷",text:"☰",document:"⎙",assignment:"✎",quiz:"?"};

async function load(){
  if(!COURSE_ID){$("stage").innerHTML='<div class="empty">No course specified.</div>';return;}
  DATA=await apiRequest("/lms/my/courses/"+COURSE_ID);
  if(!DATA||DATA.error){$("stage").innerHTML='<div class="empty">'+((DATA&&DATA.msg)||"Could not load course")+'</div>';return;}
  $("ct").textContent=DATA.course.title||"Course";
  renderList(); updateProgress();
  // auto-open first incomplete lesson
  var first=null,firstAny=null;
  DATA.modules.forEach(function(m){m.lessons.forEach(function(l){if(!firstAny)firstAny=l;if(!first&&l.progress.status!=="completed")first=l;});});
  if(first||firstAny) openLesson((first||firstAny)._id);
}
function allLessons(){var a=[];DATA.modules.forEach(function(m){m.lessons.forEach(function(l){a.push(l);});});return a;}
function renderList(){
  $("llist").innerHTML=DATA.modules.map(function(m){
    return '<div class="mod-t">'+esc(m.title)+'</div>'+m.lessons.map(function(l){
      var done=l.progress.status==="completed";
      return '<div class="les" id="les-'+l._id+'" onclick="openLesson(\''+l._id+'\')">'+
        '<div class="tick'+(done?' done':'')+'">'+(done?'✓':'')+'</div>'+
        '<span class="ico">'+(ICON[l.type]||'•')+'</span><span style="flex:1">'+esc(l.title)+'</span></div>';
    }).join("");
  }).join("");
}
function updateProgress(){
  var all=allLessons();var done=all.filter(function(l){return l.progress.status==="completed";}).length;
  var pct=all.length?Math.round(done/all.length*100):0;
  $("bar").style.width=pct+"%";$("pct").textContent=pct+"% complete ("+done+"/"+all.length+")";
}
function openLesson(id){
  flushSave();
  var l=allLessons().find(function(x){return x._id===id;});if(!l)return;CUR=l;
  document.querySelectorAll(".les").forEach(function(e){e.classList.remove("on");});
  var el=$("les-"+id);if(el)el.classList.add("on");
  $("lessonTitle").textContent=l.title;$("completeBtn").style.display="inline-flex";
  var html="";
  if(l.type==="video"){
    if(l.videoFile){
      html='<div class="vwrap"><video id="vid" controls preload="metadata" src="'+API_BASE+'/lms/lessons/'+l._id+'/video?token='+encodeURIComponent(TOKEN)+'"></video></div>';
    }else if(l.videoUrl){
      var u=l.videoUrl, emb=u;
      var yt=u.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]+)/);
      if(yt)emb="https://www.youtube.com/embed/"+yt[1];
      html='<div class="vwrap"><iframe src="'+esc(emb)+'" allowfullscreen></iframe></div>';
    }else{ html='<div class="ph">No video attached to this lesson yet.</div>'; }
    if(l.content) html+='<div class="body"><div class="txt">'+esc(l.content)+'</div></div>';
  }else if(l.type==="text"||l.type==="document"){
    html='<div class="body"><div class="txt">'+(l.content?esc(l.content):"No content.")+'</div></div>';
  }else{
    html='<div class="ph">'+esc(l.type.charAt(0).toUpperCase()+l.type.slice(1))+'s are coming in the next phase.'+(l.content?'<div class="txt" style="margin-top:14px;text-align:left">'+esc(l.content)+'</div>':'')+'</div>';
  }
  // resources
  if(l.resources&&l.resources.length){
    html+='<div class="body" style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Resources</div>'+
      l.resources.map(function(r){return '<a class="res" href="'+HOST+r.fileUrl+'?token='+encodeURIComponent(TOKEN)+'" target="_blank">⬇ '+esc(r.fileName||"Download")+'</a>';}).join("")+'</div>';
  }
  $("stage").innerHTML=html;
  // resume + autosave for video
  var v=$("vid");
  if(v){
    var pos=l.progress.lastPositionSec||0;
    v.addEventListener("loadedmetadata",function(){ if(pos>0&&pos<v.duration) v.currentTime=pos; });
    v.addEventListener("timeupdate",function(){
      if(Date.now()-saveTimer>15000){ saveTimer=Date.now(); saveProgress(l._id,Math.floor(v.currentTime)); }
    });
    v.addEventListener("ended",function(){ markComplete(); });
  }
}
async function saveProgress(id,pos){ try{ await apiRequest("/lms/lessons/"+id+"/progress","PATCH",{lastPositionSec:pos}); }catch(e){} }
function flushSave(){ var v=$("vid"); if(v&&CUR){ saveProgress(CUR._id,Math.floor(v.currentTime||0)); } }
async function markComplete(){
  if(!CUR)return;
  var r=await apiRequest("/lms/lessons/"+CUR._id+"/complete","POST",{});
  if(r&&!r.error){
    CUR.progress.status="completed";
    var el=$("les-"+CUR._id);if(el){var t=el.querySelector(".tick");t.classList.add("done");t.textContent="✓";}
    updateProgress();
  }
}
window.addEventListener("beforeunload",flushSave);
load();
</script>
</body>
</html>
