<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zyntrix LMS</title>
</head>
<body>
  <p style="font-family:sans-serif;color:#888;padding:20px">Opening the LMS…</p>
  <script>
    (function () {
      var role = "";
      try { role = (JSON.parse(sessionStorage.getItem("user") || "{}").role || ""); } catch (e) {}
      var staff = ["lms", "instructor", "super_admin", "admin"].indexOf(role) >= 0;
      window.location.replace(staff ? "lms_system/dashboard.html" : "lms_system/student-dashboard.html");
    })();
  </script>
</body>
</html>
