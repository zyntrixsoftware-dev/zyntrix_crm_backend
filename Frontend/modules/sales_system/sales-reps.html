<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Reps — ZyntrixCRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080e18;--bg2:#0d1624;--bg3:#111e30;--bg4:#162436;--accent:#00e5b0;--accent2:#00c99a;--accent-dim:rgba(0,229,176,.10);--blue:#3d8ef0;--blue-dim:rgba(61,142,240,.12);--amber:#f5a623;--amber-dim:rgba(245,166,35,.12);--rose:#ff4d6d;--rose-dim:rgba(255,77,109,.12);--purple:#b57bee;--purple-dim:rgba(181,123,238,.12);--teal:#22d3ee;--teal-dim:rgba(34,211,238,.12);--green:#22c55e;--green-dim:rgba(34,197,94,.12);--text:#e8f0fe;--text2:#8ba3bf;--text3:#4e6680;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--font:'Instrument Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;--sidebar:230px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
.shell{display:flex;height:100vh}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.brand-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--blue));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:14px;font-weight:800;color:var(--bg);flex-shrink:0}
.nav-grp{padding:12px 8px 4px}.nav-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:0 8px 6px}
.nav-a{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:12.5px;text-decoration:none;transition:all .15s;margin-bottom:1px;position:relative}
.nav-a:hover{background:rgba(255,255,255,.04);color:var(--text)}.nav-a.on{background:var(--accent-dim);color:var(--accent)}
.nav-a.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-ico{width:16px;text-align:center;font-size:12px;flex-shrink:0}.sb-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;min-height:58px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px}
.pg-hd{flex:1}.pg-title{font-family:var(--display);font-size:15px;font-weight:700}.pg-crumb{font-size:10px;color:var(--text3)}.pg-crumb span{color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:all .15s}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11px}
select.mon-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:var(--font);font-size:12px;padding:5px 10px;cursor:pointer;outline:none}
select.mon-sel:focus{border-color:var(--accent)}
.content{flex:1;overflow-y:auto;padding:20px 22px 32px}

/* LEADERBOARD podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;padding:16px 0 28px}
.pod{display:flex;flex-direction:column;align-items:center;gap:8px}
.pod-rank{font-family:var(--display);font-size:28px;font-weight:800}
.pod-av{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;font-family:var(--display);color:var(--bg)}
.pod-name{font-size:12px;font-weight:700;color:var(--text);text-align:center;max-width:100px}
.pod-rev{font-size:13px;font-weight:800;font-family:var(--mono)}
.pod-bar{width:80px;border-radius:8px 8px 0 0}
.pod-bar-1{background:linear-gradient(to top,#f59e0b,#fbbf24)}
.pod-bar-2{background:linear-gradient(to top,#94a3b8,#cbd5e1)}
.pod-bar-3{background:linear-gradient(to top,#b45309,#d97706)}

/* REP CARDS GRID */
.reps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.rep-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s}
.rep-card:hover{border-color:var(--border2)}
.rep-card.rank-1{border-color:rgba(245,158,11,.35)}
.rep-card.rank-2{border-color:rgba(148,163,184,.25)}
.rep-card.rank-3{border-color:rgba(180,83,9,.3)}
.rep-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rep-av{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;font-family:var(--display);color:var(--bg);flex-shrink:0}
.rep-name{font-size:13.5px;font-weight:700;color:var(--text)}
.rep-role{font-size:10.5px;color:var(--text3);margin-top:2px}
.rep-rank{margin-left:auto;font-family:var(--display);font-size:22px;font-weight:800;color:var(--text3)}
.rep-rank.r1{color:#f59e0b}.rep-rank.r2{color:#94a3b8}.rep-rank.r3{color:#b45309}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--bg3);border-radius:9px;padding:10px 10px 8px;text-align:center}
.stat-val{font-family:var(--display);font-size:18px;font-weight:800;line-height:1}
.stat-lbl{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
/* progress bars */
.prog-wrap{display:flex;flex-direction:column;gap:7px}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-lbl{font-size:10.5px;color:var(--text3);width:80px;flex-shrink:0}
.prog-bar-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width .6s ease}
.prog-pct{font-size:10px;font-family:var(--mono);color:var(--text3);width:34px;text-align:right;flex-shrink:0}

/* empty */
.empty{text-align:center;padding:60px;color:var(--text3)}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;gap:10px;flex-direction:column}
.toast-item{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:12.5px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:slideIn .25s ease;min-width:240px}
.toast-item.ok{border-color:rgba(0,229,176,.35);color:var(--accent)}.toast-item.err{border-color:rgba(255,77,109,.35);color:var(--rose)}
@keyframes slideIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none}.overlay.show{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:480px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--border2);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.drawer.open{transform:translateX(0)}
.drw-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.drw-title{flex:1;font-family:var(--display);font-size:15px;font-weight:700}
.drw-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px}.drw-close:hover{color:var(--text)}
.drw-body{flex:1;overflow-y:auto;padding:16px 22px}
.rl-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rl-stage{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.05);color:var(--text2);text-transform:uppercase;white-space:nowrap}
</style>
</head>

<script>
const API = (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')?'http://localhost:5000/api':'https://api.zyntrixsoftware.com/api';

const AVATAR_COLORS = ['#3d8ef0','#00e5b0','#b57bee','#f5a623','#ff4d6d','#22d3ee','#22c55e','#f43f5e'];
let lastReps = [];

async function apiRequest(path,opts={}){
  const token=localStorage.getItem('token');
  const r=await fetch(API+path,{headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})}, ...opts});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.msg||'Request failed');}
  return r.json();
}

function initMonthSel(){
  const sel=document.getElementById('month-sel');
  const now=new Date();
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=`${d.getMonth()+1}-${d.getFullYear()}`;
    const lbl=d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
    const opt=document.createElement('option');
    opt.value=val; opt.textContent=lbl;
    if(i===0) opt.selected=true;
    sel.appendChild(opt);
  }
}

async function load(){
  document.getElementById('content').innerHTML='<div class="empty" id="loading">Loading…</div>';
  const [m,y]=document.getElementById('month-sel').value.split('-');
  try{
    const d=await apiRequest(`/sales/reps/stats?month=${m}&year=${y}`);
    lastReps = d.reps||[];
    render(lastReps);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="empty" style="color:var(--rose)">${e.message}</div>`;
    toast(e.message,'err');
  }
}

function initials(name){return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function avColor(i){return AVATAR_COLORS[i%AVATAR_COLORS.length];}
function fmtRev(n){return n>=100000?'₹'+(n/100000).toFixed(1)+'L':n>=1000?'₹'+(n/1000).toFixed(1)+'K':'₹'+n;}

function render(reps){
  if(!reps.length){document.getElementById('content').innerHTML='<div class="empty">No rep data for this period</div>';return;}

  // Podium (top 3)
  const top3=reps.slice(0,3);
  const podOrder=[1,0,2]; // 2nd, 1st, 3rd
  const podHeights=['70px','110px','55px'];
  const podColors=['#94a3b8','#f59e0b','#b45309'];
  const podRankSymbols=['🥇','🥈','🥉'];
  const podRanks=[1,0,2]; // maps to top3 indices for display order: 2nd left, 1st centre, 3rd right

  let podHtml='<div class="podium">';
  [[1,'#94a3b8','70px','pod-bar-2'],[0,'#f59e0b','110px','pod-bar-1'],[2,'#b45309','55px','pod-bar-3']].forEach(([ri,color,height,cls])=>{
    const rep=top3[ri];
    if(!rep) return;
    const av=avColor(ri);
    podHtml+=`<div class="pod">
      <div class="pod-rank" style="color:${color}">${['🥇','🥈','🥉'][ri]}</div>
      <div class="pod-av" style="background:${av}">${initials(rep.rep?.name)}</div>
      <div class="pod-name">${rep.rep?.name||'—'}</div>
      <div class="pod-rev" style="color:${color}">${fmtRev(rep.revenue)}</div>
      <div class="pod-bar ${cls}" style="height:${height}"></div>
    </div>`;
  });
  podHtml+='</div>';

  // Rep cards
  let cardsHtml='<div class="reps-grid">';
  reps.forEach((r,i)=>{
    const rank=i+1;
    const rankClass=rank<=3?`rank-${rank}`:'';
    const rankLabel=rank<=3?['r1','r2','r3'][i]:'';
    const av=avColor(i);
    const tgt=r.target;
    const revPct = tgt?.targetRevenue ? Math.min(100,Math.round(r.revenue/tgt.targetRevenue*100)) : null;
    const enrollPct = tgt?.targetEnrollments ? Math.min(100,Math.round(r.enrollments/tgt.targetEnrollments*100)) : null;
    const leadPct = tgt?.targetLeads ? Math.min(100,Math.round(r.leads/tgt.targetLeads*100)) : null;
    const demoPct = tgt?.targetDemos ? Math.min(100,Math.round(r.demos/tgt.targetDemos*100)) : null;

    const progBar=(pct,color)=>pct!==null?`<div class="prog-row">
      <div class="prog-lbl">${['Revenue','Enrollments','Leads','Demos'][0]}</div>
      <div class="prog-bar-bg"><div class="prog-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="prog-pct">${pct}%</div>
    </div>`:'';

    const convRate=r.leads>0?Math.round(r.enrollments/r.leads*100):0;

    cardsHtml+=`<div class="rep-card ${rankClass}" style="cursor:pointer" onclick="openRepDetail('${r.rep?._id||''}')">
      <div class="rep-top">
        <div class="rep-av" style="background:${av}">${initials(r.rep?.name)}</div>
        <div>
          <div class="rep-name">${r.rep?.name||'Unknown'}</div>
          <div class="rep-role">${r.rep?.role||'sales'}</div>
        </div>
        <div class="rep-rank ${rankLabel}">#${rank}</div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${fmtRev(r.revenue)}</div><div class="stat-lbl">Revenue</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--green)">${r.enrollments}</div><div class="stat-lbl">Enrolled</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--blue)">${r.leads}</div><div class="stat-lbl">Leads</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--purple)">${r.demos}</div><div class="stat-lbl">Demos</div></div>
      </div>
      ${tgt ? `<div class="prog-wrap">
        ${revPct!==null?`<div class="prog-row"><div class="prog-lbl">Revenue</div><div class="prog-bar-bg"><div class="prog-bar" style="width:${revPct}%;background:var(--accent)"></div></div><div class="prog-pct">${revPct}%</div></div>`:''}
        ${enrollPct!==null?`<div class="prog-row"><div class="prog-lbl">Enrollments</div><div class="prog-bar-bg"><div class="prog-bar" style="width:${enrollPct}%;background:var(--green)"></div></div><div class="prog-pct">${enrollPct}%</div></div>`:''}
        ${leadPct!==null?`<div class="prog-row"><div class="prog-lbl">Leads</div><div class="prog-bar-bg"><div class="prog-bar" style="width:${leadPct}%;background:var(--blue)"></div></div><div class="prog-pct">${leadPct}%</div></div>`:''}
      </div>` : `<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px 0">No target set for this month · <a href="targets.html" style="color:var(--accent);text-decoration:none">Set Target</a></div>`}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between">
        <span>Conversion rate</span>
        <span style="color:${convRate>=20?'var(--accent)':convRate>=10?'var(--amber)':'var(--rose)'};font-weight:700">${convRate}%</span>
      </div>
    </div>`;
  });
  cardsHtml+='</div>';

  document.getElementById('content').innerHTML=podHtml+cardsHtml;
}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');const d=document.createElement('div');
  d.className='toast-item '+type;d.textContent=msg;t.appendChild(d);setTimeout(()=>d.remove(),3500);
}

async function openRepDetail(id){
  if(!id) return;
  const rep = lastReps.find(r => (r.rep && r.rep._id) === id);
  document.getElementById('rep-drw-title').textContent = ((rep && rep.rep && rep.rep.name) || 'Rep') + ' — assigned leads';
  document.getElementById('rep-drw-body').innerHTML = '<div style="color:var(--text3);padding:8px 0">Loading…</div>';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('repDrw').classList.add('open');
  try{
    const d = await apiRequest(`/sales/leads?assignedTo=${id}&archived=false&limit=500`);
    const leads = d.leads||[];
    const head = rep ? `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
      <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${fmtRev(rep.revenue)}</div><div class="stat-lbl">Revenue</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--green)">${rep.enrollments}</div><div class="stat-lbl">Enrolled</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--blue)">${rep.leads}</div><div class="stat-lbl">Leads</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--purple)">${rep.demos}</div><div class="stat-lbl">Demos</div></div>
    </div>` : '';
    const STMAP={new_lead:'New',contacted:'Contacted',demo_scheduled:'Demo Sched.',demo_attended:'Demo Done',enrolled:'Enrolled',dropped:'Dropped',completed:'Completed'};
    const rows = leads.length ? leads.map(l=>`<div class="rl-row">
      <div><div style="font-weight:600;color:var(--text);font-size:12.5px">${l.fullName||'—'}</div>
      <div style="font-size:10.5px;color:var(--text3)">${l.phone||''}${l.courseInterest&&l.courseInterest.title?' · '+l.courseInterest.title:''}</div></div>
      <span class="rl-stage">${STMAP[l.pipelineStage]||l.pipelineStage}</span>
    </div>`).join('') : '<div style="color:var(--text3);padding:10px 0">No leads assigned to this rep yet.</div>';
    document.getElementById('rep-drw-body').innerHTML = head +
      `<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:6px 0 4px">Assigned Leads (${leads.length})</div>` + rows;
  }catch(e){ document.getElementById('rep-drw-body').innerHTML = `<div style="color:var(--rose)">${e.message}</div>`; }
}
function closeRepDrawer(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('repDrw').classList.remove('open'); }

initMonthSel();
load();
</script>
