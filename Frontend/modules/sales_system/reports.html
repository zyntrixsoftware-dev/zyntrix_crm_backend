<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reports — ZyntrixCRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080e18;--bg2:#0d1624;--bg3:#111e30;--bg4:#162436;--accent:#00e5b0;--accent2:#00c99a;--accent-dim:rgba(0,229,176,.10);--blue:#3d8ef0;--blue-dim:rgba(61,142,240,.12);--amber:#f5a623;--amber-dim:rgba(245,166,35,.12);--rose:#ff4d6d;--rose-dim:rgba(255,77,109,.12);--purple:#b57bee;--purple-dim:rgba(181,123,238,.12);--teal:#22d3ee;--teal-dim:rgba(34,211,238,.12);--green:#22c55e;--green-dim:rgba(34,197,94,.12);--text:#e8f0fe;--text2:#8ba3bf;--text3:#4e6680;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--font:'Instrument Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;--sidebar:230px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
.shell{display:flex;height:100vh}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.brand-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--blue));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:14px;font-weight:800;color:var(--bg);flex-shrink:0}
.nav-grp{padding:12px 8px 4px}.nav-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:0 8px 6px}
.nav-a{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:12.5px;text-decoration:none;transition:all .15s;margin-bottom:1px;position:relative}
.nav-a:hover{background:rgba(255,255,255,.04);color:var(--text)}.nav-a.on{background:var(--accent-dim);color:var(--accent)}
.nav-a.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-ico{width:16px;text-align:center;font-size:12px;flex-shrink:0}.sb-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;min-height:58px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px}
.pg-hd{flex:1}.pg-title{font-family:var(--display);font-size:15px;font-weight:700}.pg-crumb{font-size:10px;color:var(--text3)}.pg-crumb span{color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:all .15s}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11px}
.content{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:20px}
/* Sections */
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 22px}
.rc-title{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:4px}
.rc-sub{font-size:11px;color:var(--text3);margin-bottom:16px}
/* Horizontal bar chart */
.hbar-item{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.hbar-label{width:120px;font-size:12px;color:var(--text2);flex-shrink:0;text-align:right}
.hbar-track{flex:1;height:22px;background:var(--bg4);border-radius:4px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:var(--bg);transition:width .5s ease;min-width:2px}
.hbar-val{font-family:var(--mono);font-size:11px;color:var(--text3);width:60px;text-align:right;flex-shrink:0}
/* Revenue bars (vertical-style horizontal) */
.rev-grid{display:flex;align-items:flex-end;gap:10px;height:120px;margin-top:8px}
.rev-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.rev-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.rev-bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s ease;min-height:2px}
.rev-label{font-size:10px;color:var(--text3)}
.rev-amount{font-size:10px;color:var(--accent);font-family:var(--mono)}
/* Conversion funnel */
.funnel-list{display:flex;flex-direction:column;gap:6px}
.funnel-item{display:flex;align-items:center;gap:10px}
.funnel-stage{width:130px;font-size:12px;color:var(--text2);flex-shrink:0}
.funnel-bar-wrap{flex:1;height:28px;background:var(--bg4);border-radius:6px;overflow:hidden;position:relative}
.funnel-fill{height:100%;display:flex;align-items:center;padding:0 10px;border-radius:6px;font-size:11px;font-weight:700;color:var(--bg);transition:width .5s ease;min-width:4px}
.funnel-count{width:80px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0}
.funnel-pct{width:44px;text-align:right;font-size:11px;color:var(--text3);flex-shrink:0}
/* Rep table */
table.rep-tbl{width:100%;border-collapse:collapse}
table.rep-tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;border-bottom:1px solid var(--border)}
table.rep-tbl td{padding:9px 10px;font-size:12.5px;border-bottom:1px solid var(--border)}
table.rep-tbl tr:last-child td{border-bottom:none}
table.rep-tbl tr:hover td{background:var(--bg3)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.4);animation:si .25s ease}
.toast.ok{border-color:rgba(0,229,176,.3)}.toast.err{border-color:rgba(255,77,109,.3)}
@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.spin{animation:sp .8s linear infinite;display:inline-block}@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--text3);font-size:12px}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="brand"><div class="brand-mark">Z</div><div><div style="font-family:var(--display);font-size:13px;font-weight:700">ZyntrixCRM</div><div style="font-size:9px;color:var(--text3);font-family:var(--mono)">SALES SYSTEM</div></div></div>
  <div class="nav-grp"><div class="nav-lbl">Pipeline</div>
    <a class="nav-a" href="leads.html"><span class="nav-ico">&#9776;</span>Leads Pipeline</a>
    <a class="nav-a" href="demos.html"><span class="nav-ico">&#9654;</span>Demo Sessions</a>
    <a class="nav-a" href="followups.html"><span class="nav-ico">&#128222;</span>Follow-Ups</a>
  </div>
  <div class="nav-grp"><div class="nav-lbl">Catalogue</div>
    <a class="nav-a" href="courses.html"><span class="nav-ico">&#9658;</span>Courses</a>
    <a class="nav-a" href="batches.html"><span class="nav-ico">&#128467;</span>Batches</a>
  </div>
  <div class="nav-grp"><div class="nav-lbl">Finance</div>
    <a class="nav-a" href="enrollments.html"><span class="nav-ico">&#9654;</span>Enrollments</a>
    <a class="nav-a" href="payments.html"><span class="nav-ico">&#128179;</span>Payments</a>
  </div>
  <div class="nav-grp"><div class="nav-lbl">Performance</div>
    <a class="nav-a" href="targets.html"><span class="nav-ico">&#127919;</span>Targets</a>
    <a class="nav-a on" href="reports.html"><span class="nav-ico">&#9741;</span>Reports</a>
  </div>
  <div class="sb-foot"><a class="nav-a" href="../../index.html"><span class="nav-ico">&#8592;</span>Back to CRM</a></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="pg-hd"><div class="pg-title">Reports</div><div class="pg-crumb">Performance &rsaquo; <span>Reports</span></div></div>
    <button class="btn btn-ghost btn-sm" onclick="init()">&#8635; Refresh</button>
  </div>
  <div class="content" id="content">
    <div class="empty"><span class="spin">&#9696;</span> Loading reports…</div>
  </div>
</div>
</div>

<div class="toast-wrap" id="tw"></div>
<script src="../../assets/js/api.js"></script>
<script>
const STAGE_LABELS = {
  new:'New',contacted:'Contacted',demo_scheduled:'Demo Sched.',
  demo_attended:'Demo Attended',negotiation:'Negotiation',
  enrolled:'Enrolled',dropped:'Dropped'
};
const STAGE_COLORS = {
  new:'var(--blue)',contacted:'var(--teal)',demo_scheduled:'var(--amber)',
  demo_attended:'var(--purple)',negotiation:'var(--accent)',
  enrolled:'var(--green)',dropped:'var(--rose)'
};

async function init() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty"><span class="spin">&#9696;</span> Loading reports…</div>';
  const [pipeline, revenue, conversion, repPerf] = await Promise.all([
    apiRequest('/sales/reports/pipeline'),
    apiRequest('/sales/reports/revenue?months=6'),
    apiRequest('/sales/reports/conversion'),
    apiRequest('/sales/reports/rep-performance?month=' + (new Date().getMonth()+1) + '&year=' + new Date().getFullYear())
  ]);

  content.innerHTML = '';

  // Section 1: Pipeline Funnel
  content.appendChild(renderPipeline(pipeline));

  // Section 2 + 3 side by side
  const row = document.createElement('div');
  row.className = 'two-col';
  row.appendChild(renderRevenue(revenue));
  row.appendChild(renderConversion(conversion));
  content.appendChild(row);

  // Section 4: Rep Performance
  content.appendChild(renderRepPerf(repPerf));
}

function renderPipeline(data) {
  const card = document.createElement('div');
  card.className = 'report-card';
  const stages = data.stages || data || [];
  const total = stages.reduce((s, r) => s + (r.count||0), 0) || 1;

  card.innerHTML = `
    <div class="rc-title">&#128202; Pipeline by Stage</div>
    <div class="rc-sub">Current lead distribution across all pipeline stages</div>
    ${stages.length ? stages.map(s => {
      const label = STAGE_LABELS[s._id] || s._id || '—';
      const color = STAGE_COLORS[s._id] || 'var(--accent)';
      const pct = Math.round(s.count / total * 100);
      return `<div class="hbar-item">
        <div class="hbar-label">${label}</div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${color}">${pct > 8 ? pct+'%' : ''}</div></div>
        <div class="hbar-val">${s.count}</div>
      </div>`;
    }).join('') : '<div class="empty">No data</div>'}
  `;
  return card;
}

function renderRevenue(data) {
  const card = document.createElement('div');
  card.className = 'report-card';
  const months = data.revenue || data || [];
  const maxRev = Math.max(...months.map(m => m.total||0), 1);
  const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  card.innerHTML = `
    <div class="rc-title">&#128200; Monthly Revenue</div>
    <div class="rc-sub">Last 6 months collection</div>
    ${months.length ? `<div class="rev-grid">
      ${months.map(m => {
        const heightPct = Math.max(4, Math.round((m.total||0) / maxRev * 100));
        const label = `${monthNames[m._id?.month||1]} ${String(m._id?.year||'').slice(2)}`;
        return `<div class="rev-col">
          <div class="rev-amount">₹${Math.round((m.total||0)/1000)}k</div>
          <div class="rev-bar-wrap"><div class="rev-bar" style="height:${heightPct}%;background:linear-gradient(180deg,var(--accent),var(--blue))"></div></div>
          <div class="rev-label">${label}</div>
        </div>`;
      }).join('')}
    </div>` : '<div class="empty">No revenue data</div>'}
  `;
  return card;
}

function renderConversion(data) {
  const card = document.createElement('div');
  card.className = 'report-card';
  const total = data.totalLeads || 1;
  const steps = [
    { label:'Total Leads', count: data.totalLeads||0, color:'var(--blue)' },
    { label:'Contacted', count: data.contacted||0, color:'var(--teal)' },
    { label:'Demo Scheduled', count: data.demos||0, color:'var(--amber)' },
    { label:'Demo Attended', count: data.demoAttended||0, color:'var(--purple)' },
    { label:'Enrolled', count: data.enrolled||0, color:'var(--green)' },
  ];

  card.innerHTML = `
    <div class="rc-title">&#128101; Conversion Funnel</div>
    <div class="rc-sub">Lead-to-enrollment conversion rates</div>
    <div class="funnel-list">
      ${steps.map(s => {
        const pct = Math.round(s.count / total * 100);
        const convPct = s.count && data.totalLeads ? Math.round(s.count / data.totalLeads * 100) : 0;
        return `<div class="funnel-item">
          <div class="funnel-stage">${s.label}</div>
          <div class="funnel-bar-wrap"><div class="funnel-fill" style="width:${Math.max(pct,2)}%;background:${s.color}">${pct > 10 ? pct+'%' : ''}</div></div>
          <div class="funnel-count">${s.count}</div>
          <div class="funnel-pct" style="color:${s.color}">${convPct}%</div>
        </div>`;
      }).join('')}
    </div>
  `;
  return card;
}

function renderRepPerf(data) {
  const card = document.createElement('div');
  card.className = 'report-card';
  const reps = data.reps || data || [];
  const sorted = [...reps].sort((a, b) => (b.revenue||0) - (a.revenue||0));

  card.innerHTML = `
    <div class="rc-title">&#128175; Rep Performance — ${new Date().toLocaleString('en-IN',{month:'long',year:'numeric'})}</div>
    <div class="rc-sub">Sorted by revenue generated this month</div>
    ${sorted.length ? `<table class="rep-tbl">
      <thead><tr><th>#</th><th>Rep Name</th><th>Leads</th><th>Demos</th><th>Enrollments</th><th>Revenue</th></tr></thead>
      <tbody>
        ${sorted.map((r, i) => `<tr>
          <td style="color:var(--text3)">${i+1}</td>
          <td><strong>${r.user?.name || r.userName || '—'}</strong></td>
          <td>${r.leads||0}</td>
          <td>${r.demos||0}</td>
          <td>${r.enrollments||0}</td>
          <td style="font-family:var(--mono);color:var(--accent)">₹${(r.revenue||0).toLocaleString('en-IN')}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No rep performance data</div>'}
  `;
  return card;
}

function toast(msg, t='info') {
  const w = document.getElementById('tw');
  const el = document.createElement('div');
  el.className = `toast ${t}`; el.textContent = msg;
  w.appendChild(el); setTimeout(() => el.remove(), 3500);
}

init();
</script>
</body>
</html>
