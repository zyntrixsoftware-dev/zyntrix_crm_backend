<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Courses — Zyntrix Software Solutions</title>
<meta name="description" content="Browse Zyntrix courses and enrol online. Live catalogue, instant UPI payment.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070d16;--bg2:#0d1624;--bg3:#111e30;--bg4:#172638;--accent:#00e5b0;--blue:#3d8ef0;--amber:#f5a623;--rose:#ff4d6d;--green:#22c55e;--purple:#b57bee;--text:#e8f0fe;--text2:#90a6c2;--text3:#56708e;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--font:'Instrument Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:radial-gradient(1200px 600px at 80% -10%,rgba(0,229,176,.07),transparent),radial-gradient(900px 500px at 0% 0%,rgba(61,142,240,.06),transparent),var(--bg)}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
/* header */
.top{display:flex;align-items:center;gap:12px;padding:20px 0;border-bottom:1px solid var(--border)}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:21px;color:var(--bg)}
.brand-t{font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:.2px}
.brand-s{font-size:11px;color:var(--text3);font-family:var(--mono)}
.top .spacer{flex:1}
.top .login{font-size:13px;color:var(--text2);border:1px solid var(--border2);padding:8px 15px;border-radius:9px}
.top .login:hover{color:var(--text);border-color:var(--accent)}
/* hero */
.hero{padding:46px 0 26px;text-align:center}
.hero h1{font-family:var(--display);font-weight:800;font-size:38px;line-height:1.1;letter-spacing:-.5px}
.hero h1 span{background:linear-gradient(120deg,var(--accent),var(--blue));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);max-width:560px;margin:14px auto 0;font-size:15.5px}
/* search bar */
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;margin:24px 0 6px}
.bar input,.bar select{background:var(--bg2);border:1px solid var(--border2);border-radius:11px;color:var(--text);font-family:var(--font);font-size:14px;padding:11px 15px;outline:none}
.bar input{min-width:280px}
.bar input:focus,.bar select:focus{border-color:var(--accent)}
.count{text-align:center;color:var(--text3);font-size:12.5px;margin:8px 0 18px;font-family:var(--mono)}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding-bottom:60px}
.card{background:linear-gradient(180deg,var(--bg2),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;transition:.18s;position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);transform:translateY(-3px)}
.card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue))}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.bdg{font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:3px 9px;border-radius:6px;background:var(--bg4);color:var(--text2)}
.bdg.lvl{background:rgba(0,229,176,.12);color:var(--accent)}
.bdg.mode{background:rgba(61,142,240,.12);color:var(--blue)}
.card h3{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:8px;line-height:1.25}
.desc{color:var(--text2);font-size:13.5px;flex:1;margin-bottom:14px}
.hl{list-style:none;margin:0 0 14px;padding:0;display:flex;flex-direction:column;gap:6px}
.hl li{font-size:12.5px;color:var(--text2);padding-left:20px;position:relative}
.hl li::before{content:"✓";position:absolute;left:0;color:var(--accent);font-weight:700}
.meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3);margin-bottom:14px;font-family:var(--mono)}
.foot{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:auto;padding-top:14px;border-top:1px solid var(--border)}
.price .now{font-family:var(--display);font-weight:800;font-size:22px}
.price .mrp{font-size:13px;color:var(--text3);text-decoration:line-through;margin-left:6px}
.price .free{font-family:var(--display);font-weight:800;font-size:20px;color:var(--green)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:var(--font);font-weight:600;font-size:13.5px;padding:11px 17px;border-radius:10px;background:var(--accent);color:var(--bg);transition:.15s;white-space:nowrap}
.btn:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn.ghost:hover{color:var(--text);border-color:var(--accent)}
.btn.block{width:100%}
.btn:disabled{opacity:.55;cursor:not-allowed}
.state{text-align:center;color:var(--text3);padding:60px 0;font-size:14px}
.spin{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
/* modal */
.ov{position:fixed;inset:0;background:rgba(3,7,13,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:18px}
.ov.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;padding:24px}
.modal h2{font-family:var(--display);font-weight:800;font-size:20px;margin-bottom:3px}
.modal .csub{color:var(--text3);font-size:12.5px;font-family:var(--mono);margin-bottom:18px}
.fl{display:block;font-size:11.5px;font-weight:600;color:var(--text2);margin:13px 0 6px;letter-spacing:.2px}
.in{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;padding:11px 13px;outline:none}
.in:focus{border-color:var(--accent)}
.amtwrap{position:relative}.amtwrap .ru{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-weight:600}
.amtwrap .in{padding-left:26px}
.hint{font-size:11px;color:var(--text3);margin-top:5px}
.err{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:#ff8198;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-top:14px;display:none}
.err.on{display:block}
.x{background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;float:right;line-height:1;margin:-4px -4px 0 0}
.x:hover{color:var(--text)}
/* success */
.ok{text-align:center}
.ok .tick{width:58px;height:58px;border-radius:50%;background:rgba(34,197,94,.14);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:30px;margin:4px auto 12px}
.ok h2{font-family:var(--display);font-size:20px;margin-bottom:6px}
.ok .msg{color:var(--text2);font-size:13.5px;margin-bottom:16px}
.paybox{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:18px;margin-bottom:14px}
.qr{width:200px;height:200px;border-radius:11px;background:#fff;padding:9px;margin:0 auto 14px;display:block}
.upirow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg4);border-radius:9px;padding:10px 13px;margin-bottom:8px}
.upirow .k{font-size:11px;color:var(--text3)}
.upirow .v{font-family:var(--mono);font-weight:500;font-size:13.5px}
.copy{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:7px;font-size:11px;padding:4px 9px;cursor:pointer}
.copy:hover{color:var(--accent);border-color:var(--accent)}
.amtbig{font-family:var(--display);font-weight:800;font-size:26px;text-align:center;margin-bottom:14px}
.share{display:flex;gap:8px;margin-top:10px}
.share a{flex:1}
.note{font-size:11.5px;color:var(--text3);margin-top:14px;line-height:1.5}
.foota{text-align:center;color:var(--text3);font-size:12px;padding:24px 0 36px;border-top:1px solid var(--border);font-family:var(--mono)}
@media(max-width:560px){.hero h1{font-size:30px}.bar input{min-width:0;flex:1}}
</style></head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">Z</div>
    <div><div class="brand-t">Zyntrix</div><div class="brand-s">Software Solutions</div></div>
    <div class="spacer"></div>
    <a class="login" href="https://zyntrixsoftware.com" >← Home</a>
  </header>

  <section class="hero">
    <h1>Learn with <span>Zyntrix</span></h1>
    <p>Industry-ready courses taught by working professionals. Browse the live catalogue and enrol in minutes.</p>
  </section>

  <div class="bar">
    <input id="q" type="text" placeholder="Search courses…" oninput="render()">
    <select id="trk" onchange="render()"><option value="">All tracks</option></select>
    <select id="lvl" onchange="render()"><option value="">All levels</option></select>
  </div>
  <div class="count" id="count"></div>

  <div id="grid" class="grid"></div>
  <div id="state" class="state"><div class="spin"></div>Loading courses…</div>

  <div class="foota">© <span id="yr"></span> Zyntrix Software Solutions · Secure UPI payments</div>
</div>

<!-- Enrol modal -->
<div class="ov" id="ov">
  <div class="modal" id="mbody"></div>
</div>

<script>
var API_BASE = "https://api.zyntrixsoftware.com";
var COURSES = [], REPS = [], CUR = null;
var $ = function(id){return document.getElementById(id);};
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function inr(n){return "₹"+Number(n||0).toLocaleString("en-IN");}
function sell(c){return (c.discountPrice>0?c.discountPrice:c.price)||0;}
function titleCase(s){return String(s||"").replace(/_/g," ").replace(/\b\w/g,function(m){return m.toUpperCase();});}

$("yr").textContent = new Date().getFullYear();

// ── load catalogue + reps ────────────────────────────────────────────────────
function boot(){
  Promise.all([
    fetch(API_BASE+"/api/public/courses").then(function(r){return r.json();}),
    fetch(API_BASE+"/api/public/sales-reps").then(function(r){return r.json();}).catch(function(){return {reps:[]};})
  ]).then(function(res){
    COURSES = (res[0] && res[0].courses) || [];
    REPS    = (res[1] && res[1].reps) || [];
    buildFilters();
    $("state").style.display = COURSES.length ? "none" : "block";
    if(!COURSES.length){ $("state").innerHTML = "No courses available right now. Please check back soon."; }
    render();
  }).catch(function(){
    $("state").innerHTML = "Couldn't load courses. Please refresh the page.";
  });
}

function buildFilters(){
  var trks={}, lvls={};
  COURSES.forEach(function(c){ if(c.track)trks[c.track]=1; if(c.level)lvls[c.level]=1; });
  var ts=$("trk"); Object.keys(trks).sort().forEach(function(t){ var o=document.createElement("option"); o.value=t; o.textContent=titleCase(t); ts.appendChild(o); });
  var order={beginner:1,intermediate:2,advanced:3};
  var ls=$("lvl"); Object.keys(lvls).sort(function(a,b){return (order[a]||9)-(order[b]||9);}).forEach(function(l){ var o=document.createElement("option"); o.value=l; o.textContent=titleCase(l); ls.appendChild(o); });
}

// ── render cards ─────────────────────────────────────────────────────────────
function render(){
  var q=($("q").value||"").toLowerCase().trim(), trk=$("trk").value, lvl=$("lvl").value;
  var list = COURSES.filter(function(c){
    if(trk && c.track!==trk) return false;
    if(lvl && c.level!==lvl) return false;
    if(q){ var hay=((c.title||"")+" "+(c.description||"")+" "+((c.tags||[]).join(" "))).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
  $("count").textContent = list.length + " course" + (list.length===1?"":"s") + (COURSES.length!==list.length?(" of "+COURSES.length):"");
  $("grid").innerHTML = list.map(card).join("");
}

function card(c){
  var s=sell(c), hasDisc=c.discountPrice>0 && c.price>c.discountPrice;
  var priceHtml = s>0
    ? '<span class="now">'+inr(s)+'</span>'+(hasDisc?'<span class="mrp">'+inr(c.price)+'</span>':'')
    : '<span class="free">Free</span>';
  var hls=(c.highlights||[]).filter(Boolean).slice(0,3);
  var idx = COURSES.indexOf(c);
  return ''+
   '<div class="card">'+
     '<div class="badges">'+
       (c.level?'<span class="bdg lvl">'+esc(titleCase(c.level))+'</span>':'')+
       (c.track?'<span class="bdg">'+esc(titleCase(c.track))+'</span>':'')+
       (c.mode?'<span class="bdg mode">'+esc(titleCase(c.mode))+'</span>':'')+
     '</div>'+
     '<h3>'+esc(c.title)+'</h3>'+
     '<div class="desc">'+esc(c.description||"Hands-on, project-based training to make you job-ready.")+'</div>'+
     (hls.length?'<ul class="hl">'+hls.map(function(h){return '<li>'+esc(h)+'</li>';}).join("")+'</ul>':'')+
     '<div class="meta">'+(c.durationWeeks?('⏱ '+c.durationWeeks+' weeks'):'')+'</div>'+
     '<div class="foot"><div class="price">'+priceHtml+'</div>'+
       '<button class="btn" onclick="openEnrol('+idx+')">Enrol &amp; Pay</button></div>'+
   '</div>';
}

// ── enrol modal ──────────────────────────────────────────────────────────────
function openEnrol(i){
  CUR = COURSES[i]; if(!CUR) return;
  var s=sell(CUR);
  var repOpts = '<option value="">Select sales employee…</option>' +
    REPS.map(function(r){return '<option value="'+r._id+'">'+esc(r.name)+'</option>';}).join("");
  var repBlock = REPS.length
    ? '<select class="in" id="f_rep">'+repOpts+'</select>'
    : '<input class="in" id="f_rep" placeholder="Sales employee name">';
  $("mbody").innerHTML =
    '<button class="x" onclick="closeOv()">&times;</button>'+
    '<h2>Enrol — '+esc(CUR.title)+'</h2>'+
    '<div class="csub">'+(s>0?('Course fee '+inr(s)):'Free course')+'</div>'+
    '<label class="fl">Your name *</label><input class="in" id="f_name" placeholder="Full name">'+
    '<label class="fl">Email</label><input class="in" id="f_email" type="email" placeholder="you@email.com">'+
    '<label class="fl">Phone</label><input class="in" id="f_phone" type="tel" placeholder="10-digit mobile">'+
    '<label class="fl">Sales employee *</label>'+repBlock+
    '<label class="fl">Amount to pay now *</label>'+
    '<div class="amtwrap"><span class="ru">₹</span><input class="in" id="f_amt" type="number" min="1" value="'+(s>0?s:'')+'"></div>'+
    '<div class="hint">You can pay the full fee or a part now — your sales employee will confirm and guide the rest.</div>'+
    '<div class="err" id="f_err"></div>'+
    '<button class="btn block" id="f_go" style="margin-top:18px" onclick="submitEnrol()">Continue to payment →</button>';
  $("f_email") && requestAnimationFrame(function(){ $("f_name").focus(); });
  $("ov").classList.add("on");
}
function closeOv(){ $("ov").classList.remove("on"); }
$("ov").addEventListener("click",function(e){ if(e.target===$("ov")) closeOv(); });

function showErr(m){ var e=$("f_err"); if(e){ e.textContent=m; e.classList.add("on"); } }

function submitEnrol(){
  var name=($("f_name").value||"").trim();
  var email=($("f_email").value||"").trim();
  var phone=($("f_phone").value||"").trim();
  var repEl=$("f_rep"), repVal=(repEl.value||"").trim();
  var amt=Number($("f_amt").value);
  var e=$("f_err"); if(e) e.classList.remove("on");
  if(!name) return showErr("Please enter your name.");
  if(!email && !phone) return showErr("Please enter an email or phone number.");
  if(REPS.length && !repVal) return showErr("Please choose your sales employee.");
  if(!repVal) return showErr("Please enter the sales employee's name.");
  if(!(amt>=1)) return showErr("Please enter the amount you want to pay.");

  var body={ name:name, email:email, phone:phone, courseId:CUR._id, amount:amt };
  // dropdown gives an id; free-text gives a name (backend requires id, so dropdown is the supported path)
  body.repId = repVal;

  var btn=$("f_go"); btn.disabled=true; btn.textContent="Please wait…";
  fetch(API_BASE+"/api/public/enroll",{
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
  }).then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
   .then(function(res){
     if(!res.ok){ btn.disabled=false; btn.textContent="Continue to payment →"; return showErr(res.j.msg||"Something went wrong. Please try again."); }
     showSuccess(res.j);
   }).catch(function(){
     btn.disabled=false; btn.textContent="Continue to payment →"; showErr("Network error. Please try again.");
   });
}

function showSuccess(d){
  if(!d.upiConfigured){
    $("mbody").innerHTML =
      '<button class="x" onclick="closeOv()">&times;</button><div class="ok">'+
      '<div class="tick">✓</div><h2>Request received</h2>'+
      '<div class="msg">'+esc(d.msg||"Our team will contact you shortly to complete your payment.")+'</div>'+
      '<button class="btn block" onclick="closeOv()">Done</button></div>';
    return;
  }
  var sh='';
  if(d.whatsapp) sh+='<a class="btn ghost" href="'+esc(d.whatsapp)+'" target="_blank">WhatsApp</a>';
  if(d.sms)      sh+='<a class="btn ghost" href="'+esc(d.sms)+'">SMS</a>';
  $("mbody").innerHTML =
    '<button class="x" onclick="closeOv()">&times;</button><div class="ok">'+
      '<div class="tick">✓</div>'+
      '<h2>Almost there!</h2>'+
      '<div class="msg">Scan the QR or pay to the UPI ID below to complete your enrolment for <b>'+esc(d.course)+'</b>.</div>'+
      '<div class="amtbig">'+inr(d.amount)+'</div>'+
      '<div class="paybox">'+
        '<img class="qr" src="'+esc(d.qr)+'" alt="UPI QR">'+
        '<div class="upirow"><div><div class="k">UPI ID</div><div class="v" id="upival">'+esc(d.upiId)+'</div></div>'+
          '<button class="copy" onclick="copyUpi(\''+esc(d.upiId)+'\')">Copy</button></div>'+
        '<div class="upirow"><div><div class="k">Payee</div><div class="v">'+esc(d.upiName||"Zyntrix Software Solutions")+'</div></div></div>'+
        '<a class="btn block" style="margin-top:10px" href="'+esc(d.url)+'">Open in UPI app</a>'+
        (sh?('<div class="share">'+sh+'</div>'):'')+
      '</div>'+
      '<div class="note">Use any UPI app — GPay, PhonePe, Paytm, BHIM. After paying, <b>'+esc(d.rep)+'</b> (your sales employee) will confirm your payment and activate your enrolment.'+(d.emailed?' We\'ve also emailed you these details.':'')+'</div>'+
      '<button class="btn block" style="margin-top:14px;background:transparent;color:var(--text2);border:1px solid var(--border2)" onclick="closeOv()">Close</button>'+
    '</div>';
}
function copyUpi(v){ try{ navigator.clipboard.writeText(v); var b=event.target; var t=b.textContent; b.textContent="Copied!"; setTimeout(function(){b.textContent=t;},1400);}catch(e){} }

boot();
</script>
</body></html>
